name: Validate links on push + PR

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linkinator:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: JustinBeckwith/linkinator-action@v2.4.2
        with:
          paths: '**/*.md'
          statusCodes: '{ "429": "skip" }'
